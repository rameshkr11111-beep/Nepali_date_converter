<!DOCTYPE html>
<html lang="en">
<head>

<title>Nepali Date Converter (BS ↔ AD)</title>

    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #f4f6f8;
    color: #222;
    padding: 16px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  h1 { font-size: 20px; margin-bottom: 12px; text-align: center; }
  h2 { font-size: 16px; margin-bottom: 8px; color: #b3322a; }
  .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .tab {
    flex: 1; text-align: center; padding: 10px;
    border-radius: 8px; background: #eee; cursor: pointer;
    font-weight: 600; font-size: 14px;
  }
  .tab.active { background: #b3322a; color: #fff; }
  .row { display: flex; gap: 8px; margin-bottom: 10px; }

    border-radius: 8px; font-size: 14px; background: #fff;
  }
  button {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    background: #b3322a; color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer;
  }
  .result {
    margin-top: 12px; padding: 12px; border-radius: 8px;
    background: #fff7e6; text-align: center; font-size: 18px; font-weight: 600;
    border: 1px solid #ffe0a3; min-height: 24px;
  }
  .today-box { text-align: center; }
  .today-box .bs { font-size: 22px; font-weight: 700; color: #b3322a; }
  .today-box .ad { font-size: 14px; color: #666; margin-top: 4px; }
  .festival-list { list-style: none; }
  .festival-list li {
    display: flex; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid #eee; font-size: 14px;
  }
  .festival-list li:last-child { border-bottom: none; }
  .ad-slot {
    background: #eee; text-align: center; padding: 10px;
    border-radius: 8px; font-size: 12px; color: #999; margin-bottom: 16px;
  }
  .hidden { display: none; }

<body>

<h1>📅 Nepali Date Converter</h1>

<div class="ad-slot">[ Banner Ad Placeholder ]</div>

<!-- TODAY'S DATE -->
<div class="card today-box">
  <h2>Today</h2>
  <div class="bs" id="todayBS">Loading...</div>
  <div class="ad" id="todayAD"></div>
</div>

<!-- CONVERTER -->
<div class="card">
  <div class="tabs">
    <div class="tab active" id="tabADtoBS">AD → BS</div>
    <div class="tab" id="tabBStoAD">BS → AD</div>
  </div>

  <!-- AD to BS inputs -->
  <div id="adInputs">
    <div class="row">
      <select id="adYear"></select>
      <select id="adMonth"></select>
      <select id="adDay"></select>
    </div>
  </div>

  <!-- BS to AD inputs -->
  <div id="bsInputs" class="hidden">
    <div class="row">
      <select id="bsYear"></select>
      <select id="bsMonth"></select>
      <select id="bsDay"></select>
    </div>
  </div>

  <button id="convertBtn">Convert</button>
  <div class="result" id="result"></div>
</div>

<div class="ad-slot">[ Banner Ad Placeholder ]</div>

<!-- FESTIVALS -->
<div class="card">

<script>

   Data: month lengths for BS 2000–2090 (12 months each)
   Source: aggregated from public open-source Nepali calendar projects
   (e.g. medic/bikram-sambat, sajanmaharjan/nepali-date-converter-js)
   ==================================================================== */

const REFERENCE_AD = new Date(1943, 3, 14); // April 14, 1943 = BS 2000/01/01
const BS_START_YEAR = 2000;

2089:[30,32,31,32,31,30,30,30,29,30,30,30],
2090:[30,32,31,32,31,30,30,30,29,30,30,30]
};

const bsMonthNames = ["Baisakh","Jestha","Ashadh","Shrawan","Bhadra","Ashwin","Kartik","Mangsir","Poush","Magh","Falgun","Chaitra"];
const adMonthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];

// Convert AD Date -> {year, month(1-12), day}
function adToBs(adDate) {
  let diffDays = Math.floor((adDate - REFERENCE_AD) / (1000*60*60*24));
  let bsYear = BS_START_YEAR, bsMonth = 0, bsDay = 1;

  while (true) {
    if (!bsMonthData[bsYear]) throw new Error("Year out of supported range");
    let monthLengths = bsMonthData[bsYear];
    if (bsMonth >= 12) { bsMonth = 0; bsYear++; }
    let mLen = monthLengths[bsMonth];
    if (diffDays >= mLen) {
      diffDays -= mLen;
      bsMonth++;
    } else {
      bsDay = diffDays + 1;
      break;
    }
  }
  return { year: bsYear, month: bsMonth+1, day: bsDay };
}

// Convert BS {year, month(1-12), day} -> AD Date
function bsToAd(bsYear, bsMonth, bsDay) {
  let totalDays = 0;
  // sum full years from BS_START_YEAR to bsYear-1
  for (let y = BS_START_YEAR; y < bsYear; y++) {
    if (!bsMonthData[y]) throw new Error("Year out of supported range");
    totalDays += bsMonthData[y].reduce((a,b)=>a+b,0);
  }
  // sum full months in target year
  for (let m = 0; m < bsMonth-1; m++) {
    totalDays += bsMonthData[bsYear][m];
  }
  totalDays += (bsDay - 1);

  let result = new Date(REFERENCE_AD);
  result.setDate(result.getDate() + totalDays);
  return result;
}

/* ==================== UI LOGIC ==================== */

function populateSelect(el, start, end, pad=false) {
  el.innerHTML = "";
  for (let i = start; i <= end; i++) {
    let opt = document.createElement("option");
    opt.value = i;
    opt.textContent = pad ? String(i).padStart(2,'0') : i;
    el.appendChild(opt);
  }
}

// AD inputs
const adYear = document.getElementById('adYear');
const adMonth = document.getElementById('adMonth');
const adDay = document.getElementById('adDay');
populateSelect(adYear, 1944, 2033);
adMonthNames.forEach((m,i)=>{
  let opt = document.createElement("option");
  opt.value = i+1; opt.textContent = m;
  adMonth.appendChild(opt);
});
populateSelect(adDay, 1, 31, true);

// BS inputs
const bsYear = document.getElementById('bsYear');
const bsMonth = document.getElementById('bsMonth');
const bsDay = document.getElementById('bsDay');
populateSelect(bsYear, 2000, 2090);
bsMonthNames.forEach((m,i)=>{
  let opt = document.createElement("option");
  opt.value = i+1; opt.textContent = m;
  bsMonth.appendChild(opt);
});
populateSelect(bsDay, 1, 32, true);

// Tabs
const tabAD = document.getElementById('tabADtoBS');
const tabBS = document.getElementById('tabBStoAD');
const adInputs = document.getElementById('adInputs');
const bsInputs = document.getElementById('bsInputs');
let mode = 'AD2BS';

tabAD.onclick = () => {
  mode = 'AD2BS';
  tabAD.classList.add('active'); tabBS.classList.remove('active');
  adInputs.classList.remove('hidden'); bsInputs.classList.add('hidden');
  document.getElementById('result').textContent = '';
};
tabBS.onclick = () => {
  mode = 'BS2AD';
  tabBS.classList.add('active'); tabAD.classList.remove('active');
  bsInputs.classList.remove('hidden'); adInputs.classList.add('hidden');
  document.getElementById('result').textContent = '';
};

// Convert button
document.getElementById('convertBtn').onclick = () => {
  const resultEl = document.getElementById('result');
  try {
    if (mode === 'AD2BS') {
      let y = parseInt(adYear.value), m = parseInt(adMonth.value), d = parseInt(adDay.value);
      let dateObj = new Date(y, m-1, d);
      let bs = adToBs(dateObj);
      resultEl.textContent = `${bs.day} ${bsMonthNames[bs.month-1]} ${bs.year} BS`;
    } else {
      let y = parseInt(bsYear.value), m = parseInt(bsMonth.value), d = parseInt(bsDay.value);
      let maxDay = bsMonthData[y][m-1];
      if (d > maxDay) {
        resultEl.textContent = `Invalid date: ${bsMonthNames[m-1]} ${y} has only ${maxDay} days`;
        return;
      }
      let ad = bsToAd(y, m, d);
      resultEl.textContent = `${ad.getDate()} ${adMonthNames[ad.getMonth()]} ${ad.getFullYear()} AD`;
    }
  } catch(e) {
    resultEl.textContent = "Date out of supported range (2000–2090 BS)";
  }
};

// Today's date display
function showToday() {
  const today = new Date();
  try {
    let bs = adToBs(today);
    document.getElementById('todayBS').textContent =
      `${bs.day} ${bsMonthNames[bs.month-1]} ${bs.year} BS`;
    document.getElementById('todayAD').textContent =
      `${adMonthNames[today.getMonth()]} ${today.getDate()}, ${today.getFullYear()} AD`;
  } catch(e) {
    document.getElementById('todayBS').textContent = "Unavailable";
  }
}
showToday();

const list = document.getElementById('festivalList');
festivals.forEach(f => {
